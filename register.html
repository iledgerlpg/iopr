<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar PT — i-Operasional</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-bg { position:fixed; inset:0; pointer-events:none;
      background: radial-gradient(ellipse 60% 50% at 80% 50%, rgba(6,182,212,0.1) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 60% at 20% 20%, rgba(37,99,235,0.08) 0%, transparent 70%); }
    .reg-wrap { position:relative; z-index:1; width:100%; max-width:420px; padding:16px; }
    .reg-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-xl); padding:36px 32px; box-shadow:0 32px 64px rgba(0,0,0,0.5); }
    .reg-icon { width:52px;height:52px; background:linear-gradient(135deg,var(--cyan),var(--accent)); border-radius:14px; display:flex;align-items:center;justify-content:center; font-size:22px; margin:0 auto 14px; box-shadow:0 8px 24px rgba(6,182,212,0.35); }
    .btn-reg { width:100%;padding:12px;background:linear-gradient(135deg,var(--cyan),var(--accent)); color:#fff; border:none; border-radius:var(--radius-sm); font-size:0.95rem;font-weight:700; cursor:pointer; transition:var(--transition); margin-top:8px; }
    .btn-reg:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(6,182,212,0.35); }
    .msg { text-align:center;font-size:0.8rem;margin-top:12px;padding:10px; border-radius:var(--radius-sm); display:none; }
    .msg.success { background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.25); color:var(--success); display:block; }
    .msg.error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#F87171; display:block; }
    .login-link { text-align:center;margin-top:16px;font-size:0.8rem;color:var(--text-muted); }
    .login-link a { color:#06B6D4; text-decoration:none; }
  </style>
</head>
<body>
  <div class="login-bg"></div>
  <div class="reg-wrap">
    <div class="reg-card">
      <div style="text-align:center;margin-bottom:28px">
        <div class="reg-icon">🏢</div>
        <div style="font-size:1.4rem;font-weight:800;color:var(--text-primary);letter-spacing:-0.02em">Daftar PT Baru</div>
        <div style="font-size:0.85rem;color:var(--text-muted);margin-top:4px">Buat akun untuk perusahaan Anda</div>
      </div>

      <div class="form-group">
        <label class="form-label">Email PT</label>
        <input type="email" id="email" class="form-control" placeholder="email@perusahaan.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Minimal 6 karakter">
      </div>
      <div class="form-group">
        <label class="form-label">Nama Perusahaan</label>
        <input type="text" id="nama_pt" class="form-control" placeholder="PT Nama Perusahaan">
      </div>
      <div class="form-group">
        <label class="form-label">ID Unik</label>
        <input type="text" id="id_unik" class="form-control" placeholder="Contoh: 123456">
      </div>

      <button class="btn-reg" id="regBtn" onclick="registerPT()">Daftar Sekarang</button>

      <div class="msg" id="msg"></div>

      <div class="login-link">Sudah punya akun? <a href="login.html">Login di sini</a></div>
    </div>
  </div>

  <script>
    const API = 'https://script.google.com/macros/s/AKfycbxjkeSTSkeJA-x_u6oVI7-vd3cdryqm7T6AfEebBpRb-3plZrk6XAZSMDpPDXFcN3M7rw/exec';

    async function registerPT() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const nama_pt = document.getElementById('nama_pt').value.trim();
      const id_unik = document.getElementById('id_unik').value.trim();
      const msg = document.getElementById('msg');
      const btn = document.getElementById('regBtn');

      msg.className = 'msg'; msg.style.display = 'none';

      if (!email || !password || !nama_pt || !id_unik) {
        msg.textContent = 'Semua field wajib diisi.';
        msg.className = 'msg error';
        return;
      }

      btn.textContent = 'Mendaftarkan...'; btn.disabled = true;

      try {
        const res = await fetch(API, {
          method: 'POST',
          body: new URLSearchParams({ action:'registerPT', email, password, nama_pt, id_unik })
        });
        const data = await res.json();
        if (data.status === 'success') {
          localStorage.setItem('loggedIn','true');
          localStorage.setItem('id_spreadsheet', data.id_spreadsheet);
          localStorage.setItem('nama_pt', nama_pt);
          localStorage.setItem('email', email);
          localStorage.setItem('id_unik', id_unik);
          msg.textContent = '✅ Berhasil! Mengalihkan ke dashboard...';
          msg.className = 'msg success';
          setTimeout(() => window.location.href = 'dashboard.html', 1200);
        } else {
          msg.textContent = '❌ ' + data.message;
          msg.className = 'msg error';
          btn.textContent = 'Daftar Sekarang'; btn.disabled = false;
        }
      } catch(err) {
        msg.textContent = '❌ Gagal koneksi ke server.';
        msg.className = 'msg error';
        btn.textContent = 'Daftar Sekarang'; btn.disabled = false;
      }
    }
  </script>
</body>
</html>
