<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Data Pangkalan — i-Operasional</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .app-layout { display: flex; min-height: 100vh; }
    .form-grid-8 {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-placeholder"></div>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <div class="main-content">
      <div class="topbar">
        <div class="flex" style="align-items:center;gap:12px">
          <button class="hamburger" id="hamburger">☰</button>
          <span class="topbar-title">Data Pangkalan — Harga &amp; Brimola</span>
        </div>
        <span style="font-size:0.8rem;color:var(--text-muted)" id="pt-name-top"></span>
      </div>

      <div class="page-content">
        <!-- Input Form -->
        <div class="card mb-4">
          <div class="card-header">
            <div class="card-title">Tambah / Edit Data Pangkalan</div>
            <span class="badge badge-blue">Form Input</span>
          </div>
          <div class="form-grid-8">
            <div class="form-group" style="margin:0">
              <label class="form-label">Nama Pangkalan *</label>
              <input id="uraianInput" class="form-control" placeholder="PANGKALAN A">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Nama PT *</label>
              <input id="posInput" class="form-control" placeholder="PT XYZ">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">DO yang Dimiliki</label>
              <input id="doyangdimilikiInput" class="form-control" placeholder="100">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Harga Refill (Rp)</label>
              <input id="hargarefillInput" class="form-control" placeholder="20000">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Harga Bagi Hasil (Rp)</label>
              <input id="hargabagihasilInput" class="form-control" placeholder="5000">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">ID Brimola</label>
              <input id="id_brimola" class="form-control" placeholder="BRM123">
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Password</label>
              <input id="password" class="form-control" placeholder="••••••">
            </div>
            <div style="display:flex;align-items:flex-end">
              <button class="btn btn-primary w-full" onclick="tambahPos()" style="height:38px">+ Tambah</button>
            </div>
          </div>
        </div>

        <!-- Table -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">Daftar Pangkalan</div>
            <span id="count-badge" class="badge badge-blue">0 data</span>
          </div>
          <div class="table-wrap">
            <table class="table" id="posTable">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Nama Pangkalan</th>
                  <th>Nama PT</th>
                  <th>DO</th>
                  <th>Harga Refill</th>
                  <th>Harga Bagi Hasil</th>
                  <th>ID Brimola</th>
                  <th>Password</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text-muted)">Memuat data...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="sidebar.js"></script>
  <script>
    if (!localStorage.getItem('id_spreadsheet') || localStorage.getItem('loggedIn') !== 'true') window.location.href = 'login.html';
    document.getElementById('pt-name-top').textContent = localStorage.getItem('nama_pt') || '';
    document.getElementById('sidebar-placeholder').outerHTML = buildSidebar();

    let dataPOS = [];

    function loadPOS() {
      fetch(getAPIUrl('db_pangkalan')).then(r => r.json()).then(data => {
        dataPOS = data;
        document.getElementById('count-badge').textContent = data.length + ' data';
        const tbody = document.getElementById('tableBody');
        if (!data.length) {
          tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text-muted)">Belum ada data.</td></tr>';
          return;
        }
        tbody.innerHTML = data.map((item, i) => `
          <tr>
            <td style="color:var(--text-muted)">${i+1}</td>
            <td>${item.uraian||''}</td>
            <td>${item.pos||''}</td>
            <td>${item.doyangdimiliki||''}</td>
            <td>${item.hargarefill ? formatRupiah(item.hargarefill) : '-'}</td>
            <td>${item.hargabagihasil ? formatRupiah(item.hargabagihasil) : '-'}</td>
            <td><span class="badge badge-blue">${item.id_brimola||'-'}</span></td>
            <td style="color:var(--text-muted)">••••••</td>
            <td>
              <div class="flex gap-2">
                <button class="btn btn-warning btn-sm" onclick="editPos(${i})">✏️</button>
                <button class="btn btn-danger btn-sm" onclick="hapusPos(${i+2})">🗑️</button>
              </div>
            </td>
          </tr>`).join('');
      }).catch(err => showToast('Gagal load: ' + err.message, 'error'));
    }

    function tambahPos() {
      const fields = ['uraianInput','posInput','doyangdimilikiInput','hargarefillInput','hargabagihasilInput','id_brimola','password'];
      const vals = fields.map(id => document.getElementById(id).value.trim());
      if (!vals[0] || !vals[1]) { showToast('Nama Pangkalan dan PT wajib diisi.', 'warning'); return; }

      showSpinner('Menyimpan...');
      fetch(getAPIUrl('add'), {
        method: 'POST',
        body: JSON.stringify({ sheet: 'db_pangkalan', action: 'add', payload: { values: [vals[0].toUpperCase(), vals[1].toUpperCase(), ...vals.slice(2)] } })
      }).then(r => r.json()).then(() => {
        hideSpinner();
        fields.forEach(id => document.getElementById(id).value = '');
        showToast('Data berhasil ditambahkan!', 'success');
        loadPOS();
      }).catch(err => { hideSpinner(); showToast('Gagal: ' + err.message, 'error'); });
    }

    function editPos(index) {
      const c = dataPOS[index];
      const fields = [
        ['Nama Pangkalan', c.uraian],
        ['Nama PT', c.pos],
        ['DO yang Dimiliki', c.doyangdimiliki],
        ['Harga Refill', c.hargarefill],
        ['Harga Bagi Hasil', c.hargabagihasil],
        ['ID Brimola', c.id_brimola],
        ['Password', c.password]
      ];
      const vals = [];
      for (const [label, current] of fields) {
        const v = prompt(`Edit ${label}:`, current || '');
        if (v === null) return;
        vals.push(v.trim());
      }
      showSpinner('Menyimpan...');
      fetch(getAPIUrl('edit'), {
        method: 'POST',
        body: JSON.stringify({ sheet: 'db_pangkalan', action: 'edit', payload: { row: index+2, values: [vals[0].toUpperCase(), vals[1].toUpperCase(), ...vals.slice(2)] } })
      }).then(r => r.json()).then(() => { hideSpinner(); showToast('Diperbarui!', 'success'); loadPOS(); })
      .catch(err => { hideSpinner(); showToast('Gagal: ' + err.message, 'error'); });
    }

    function hapusPos(row) {
      if (!confirm('Hapus data ini?')) return;
      showSpinner('Menghapus...');
      fetch(getAPIUrl('delete'), { method: 'POST', body: JSON.stringify({ sheet: 'db_pangkalan', action: 'delete', payload: { row } }) })
        .then(r => r.json()).then(() => { hideSpinner(); showToast('Dihapus!', 'success'); loadPOS(); })
        .catch(err => { hideSpinner(); showToast('Gagal: ' + err.message, 'error'); });
    }

    document.getElementById('hamburger').addEventListener('click', () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-backdrop').classList.toggle('show'); });
    document.getElementById('sidebar-backdrop').addEventListener('click', () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-backdrop').classList.remove('show'); });

    loadPOS(); startAutoLogout(60);
  </script>
</body>
</html>
